name: On Push trigger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: validate
    strategy:
      matrix:
        os:
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm
      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: 🏗️ Build
        run: pnpm run build
      - name: 📏 Lint
        run: pnpm run lint
      - name: 🧹 Format
        run: pnpm run fmt
      - name: 🛠️ Typecheck
        run: pnpm run typecheck
      - name: 📋 Coverage
        run: pnpm run coverage
